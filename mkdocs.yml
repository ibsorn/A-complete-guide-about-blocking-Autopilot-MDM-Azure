site_name: Breaking Free from Autopilot
site_description: Complete guide to bypass Autopilot, MDM, and Azure enrollment on Windows devices.
site_author: "Your Organization"
repo_name: ibsorn/breaking-free-from-autopilot
repo_url: https://github.com/ibsorn/breaking-free-from-autopilot

docs_dir: docs/

nav:
  - Home: index.md
  - Phase 1: phase1.md
  - Phase 2: phase2.md
  - Phase 3: phase3.md
  - Phase 4: phase4.md
  - Phase 5: phase5.md
  - Phase 6: phase6.md
  - Phase 7: phase7.md

theme:
  name: 'material'
  palette:
    scheme: 'slate'
    primary: 'indigo'
    accent: 'indigo'

markdown_extensions:
  - markdown.extensions.admonition
  - markdown.extensions.attr_list
  - markdown.extensions.codehilite:
      guess_lang: false
  - markdown.extensions.toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
